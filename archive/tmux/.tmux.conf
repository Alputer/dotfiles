# --- Core Settings -----------------------------------------------------------

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

set -g default-terminal "tmux-256color"       # Enable 256 colors
#set -as terminal-overrides ",*:RGB"           # True RGB color support
set -sg escape-time 0                         # No delay after pressing Escape
set -g history-limit 50000                    # Scrollback buffer
set -g mouse on                               # Click panes, resize, scroll
set -g base-index 1                           # Windows start at 1, not 0
setw -g pane-base-index 1                     # Panes start at 1 too
set -g renumber-windows on                    # Fill gaps when windows close
set -g focus-events on                        # Pass focus events to program 
set -g set-clipboard on 		      # Use system clipboard.


# Terminal title shows session name (not hostname)
# set -g set-titles on
# set -g set-titles-string "#S"

# --- Prefix Key: Ctrl+a (instead of default Ctrl+b) -------------------------

set -g prefix C-a
unbind C-b
bind C-a send-prefix

# --- Key Bindings ------------------------------------------------------------

# Config
bind r source-file ${XDG_CONFIG_HOME}/tmux/tmux.conf \; display "Config reloaded!" # Reload config shortcut

# Splitting (using current pane's directory)
bind s split-window -v -c "#{pane_current_path}" # Side by side
bind v split-window -h -c "#{pane_current_path}" # Top to bottom

# easier switching between next/prev window (Alt + p) and (Alt + n)
bind -n M-p previous-window
bind -n M-n next-window

# Remove default plugin bindings (optional but clean)
unbind C-h
unbind C-j
unbind C-k
unbind C-l

# Bind Ctrl+Arrow keys to vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"

# Navigate panes (no prefix needed — just Alt+Arrow)
bind-key -n M-Left  if-shell "$is_vim" 'send-keys M-Left'  'select-pane -L'
bind-key -n M-Down  if-shell "$is_vim" 'send-keys M-Down'  'select-pane -D'
bind-key -n M-Up    if-shell "$is_vim" 'send-keys M-Up'    'select-pane -U'
bind-key -n M-Right if-shell "$is_vim" 'send-keys M-Right' 'select-pane -R'

# Resize panes (no prefix needed — Ctrl+Alt+Arrow)
# GNOME Desktop hat these shortcuts so they don't work :(
bind -n C-M-Left resize-pane -L 5
bind -n C-M-Right resize-pane -R 5
bind -n C-M-Up resize-pane -U 3
bind -n C-M-Down resize-pane -D 3

# --- TPM (for plugin updates via prefix+I) -----------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
#set -g @plugin 'tmux-plugins/tmux-resurrect' # → does the actual saving/restoring
#set -g @plugin 'tmux-plugins/tmux-continuum' # → makes it happen automatically

# ---  Configure Resurrect & Continuum ----------
set -g @resurrect-strategy-nvim 'session'
#set -g @continuum-boot 'on'

# ---  Configure Catppuccin ----------

set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"


# --- Pane Look and Behavior -----------------------------------------------------------

set -g remain-on-exit off                     # Auto-close pane when agent exits
set -g display-panes-time 2000                # Show pane numbers for 2 seconds
setw -g pane-border-status top 		      # Show pane labels at the top
setw -g pane-border-format "" 		      # Label: Nothing
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines single

# --- Window Look and Behavior -----------------------------------------------------------

set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"

# Status Bar is taken from the following sources:
# https://github.com/catppuccin/tmux/discussions/317#discussioncomment-11064512
# https://github.com/naivecynics/primary-tmux

# --- Status Bar --------------------------------------------------------------
# Left: Session | Application | Directory
# Right: CPU | RAM | load | battery | time

set -g status-position top 
set -g status-interval 5                                # Refresh every 5 seconds

set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# --- Status Bar Left --------------------------------------------------------------
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# --- Status Bar Right --------------------------------------------------------------
set -g status-right-length 100
set -g status-right ""

set -ga status-right "#[bg=default,fg=#{@thm_blue},bold]  #(#{TMUX_PLUGIN_MANAGER_PATH}/tmux-mem-cpu-load/tmux-mem-cpu-load -m 2 | awk \'{print substr($1, 1, 2) }\')%% "
set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]│"
set -ga status-right "#[bg=default,fg=#{@thm_green},bold] 󰍛 #{cpu_percentage} "
set -ga status-right "#[bg=default,fg=#{@thm_overlay0},none,bold]│"
set -ga status-right "#{?#{e|>=:40,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_pink}]}} #{battery_icon} #{battery_percentage} " # Percentage check does not work.



run '~/.tmux/plugins/tpm/tpm'

# --- Post-Plugin Overrides (MUST be after TPM re-sources plugins) ------------
# TPM re-loads plugin configs, so we override catppuccin's window tab defaults here
